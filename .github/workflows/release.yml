# Release AgentDash (14 · REQ-LIC-43) — déclenché par un tag v*.
# Build release → signature Developer ID → DMG stylé → notarisation (si secrets présents)
# → publication GitHub Release avec les notes extraites du CHANGELOG.
# Aucun déploiement distant propre (pas d'appcast, modèle one-shot).
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Import Developer ID certificate
        if: ${{ env.MACOS_CERTIFICATE != '' }}
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PWD: ${{ secrets.KEYCHAIN_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > cert.p12
          security create-keychain -p "$KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PWD" build.keychain
          security import cert.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" build.keychain
          rm cert.p12

      - name: Build DMG
        env:
          ASC_KEY: ${{ secrets.ASC_KEY_PATH }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          brew install create-dmg
          scripts/make-dmg.sh

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v v="## $VERSION" '
            $0 ~ v {flag=1; next}
            /^## / && flag {exit}
            flag {print}
          ' CHANGELOG.md > relnotes.md
          echo "Notes pour $VERSION :"; cat relnotes.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" build/AgentDash.dmg \
            --title "AgentDash ${GITHUB_REF_NAME}" \
            --notes-file relnotes.md
